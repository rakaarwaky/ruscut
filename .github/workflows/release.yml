name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name_cli: ruscut
            artifact_name_tui: ruscut-tui
            asset_name_cli: ruscut-linux-x86_64
            asset_name_tui: ruscut-tui-linux-x86_64

          # Linux ARM64 (Raspberry Pi, AWS Graviton, etc.)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name_cli: ruscut
            artifact_name_tui: ruscut-tui
            asset_name_cli: ruscut-linux-arm64
            asset_name_tui: ruscut-tui-linux-arm64

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name_cli: ruscut
            artifact_name_tui: ruscut-tui
            asset_name_cli: ruscut-macos-x86_64
            asset_name_tui: ruscut-tui-macos-x86_64

          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name_cli: ruscut
            artifact_name_tui: ruscut-tui
            asset_name_cli: ruscut-macos-arm64
            asset_name_tui: ruscut-tui-macos-arm64

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name_cli: ruscut.exe
            artifact_name_tui: ruscut-tui.exe
            asset_name_cli: ruscut-windows-x86_64.exe
            asset_name_tui: ruscut-tui-windows-x86_64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Required for cross-compiling Linux ARM64
      - name: Install cross-compilation tools (Linux ARM64 only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Set cross-linker (Linux ARM64 only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename CLI binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name_cli }} ${{ matrix.asset_name_cli }}

      - name: Rename TUI binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name_tui }} ${{ matrix.asset_name_tui }}

      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ruscut-binaries-${{ matrix.target }}
          path: |
            ${{ matrix.asset_name_cli }}
            ${{ matrix.asset_name_tui }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ always() && !cancelled() && (needs.build.result == 'success' || contains(needs.build.result, 'failure')) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets for release
        run: |
          mkdir -p release_assets
          # Find all files in the artifacts directory and copy them to release_assets
          find artifacts -type f -exec cp {} release_assets/ \;
          echo "Assets to be released:"
          ls -lh release_assets/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true
